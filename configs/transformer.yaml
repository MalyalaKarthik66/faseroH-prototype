seed: 42
model: transformer
device: auto
dataset:
  path: data/taylor_dataset_20k.csv
  size: 20000
  max_order: 4
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  max_input_len: 80
  max_target_len: 120
  num_buckets: 8
training:
  epochs: 30
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0001
  grad_clip: 1.0
  early_stopping_patience: 8
  teacher_forcing_start: 1.0
  teacher_forcing_end: 0.2
  scheduled_sampling: true
  log_every: 100
  beam_width: 1
  length_penalty: 0.6
  label_smoothing: 0.1
  use_amp: true
model_params:
  d_model: 256
  nhead: 4
  num_encoder_layers: 4
  num_decoder_layers: 4
  dim_feedforward: 512
  dropout: 0.1
